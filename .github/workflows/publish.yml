name: Publish
run-name: Publish ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.target || inputs.target }}-${{ github.event_name == 'repository_dispatch' && github.event.client_payload.tag || inputs.tag || inputs.ref || 'main' }}

on:
  workflow_dispatch:
    inputs:
      target:
        description: "moon project id to publish"
        required: true
        type: string
      ref:
        description: "Git ref to publish"
        required: false
        default: main
        type: string
      tag:
        description: "GitHub release tag; inferred from the ref manifest when omitted"
        required: false
        type: string
  repository_dispatch:
    types: [publish-package]

permissions:
  id-token: write
  contents: write
  pages: write
  packages: write

concurrency:
  group: publish-${{ github.event_name == 'repository_dispatch' && github.event.client_payload.target || inputs.target }}-${{ github.event_name == 'repository_dispatch' && github.event.client_payload.tag || inputs.tag }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: publish-${{ github.event_name == 'repository_dispatch' && github.event.client_payload.target || inputs.target }}
    env:
      PUBLISH_TARGET: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.target || inputs.target }}
      PUBLISH_TAG: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.tag || inputs.tag }}
      PUBLISH_REF: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.source_sha || inputs.ref || 'main' }}
    steps:

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          ref: ${{ env.PUBLISH_REF }}

      - name: Setup Toolchain
        uses: moonrepo/setup-toolchain@8794f0318b9df4a43a5ddc23cefd16f595b423dd # v0
        with:
          auto-install: true
          auto-setup: true

      - name: Restore Moon cache
        uses: ./.github/actions/moon-cache
        with:
          key-prefix: moon-publish
          cache-version: v1

      - name: Validate publish target
        run: |
          set -euo pipefail

          if [ -z "${PUBLISH_TARGET}" ]; then
            echo "ERROR: PUBLISH_TARGET is empty. Provide a moon project id." >&2
            {
              echo "## Publish Validation Failed"
              echo
              echo "- reason: empty target"
              echo "- tag: \`${PUBLISH_TAG}\`"
              echo "- trigger: \`${{ github.event_name }}\`"
            } >> "${GITHUB_STEP_SUMMARY}"
            exit 1
          fi

          projects_json="$(moon query projects)"
          if ! jq -e --arg target "${PUBLISH_TARGET}" '.projects[] | select(.id == $target)' >/dev/null <<<"${projects_json}"; then
            valid_targets="$(jq -r '.projects[].id' <<<"${projects_json}" | sort | paste -sd ', ' -)"

            echo "ERROR: Unknown PUBLISH_TARGET '${PUBLISH_TARGET}'." >&2
            echo "Valid targets: ${valid_targets}" >&2

            {
              echo "## Publish Validation Failed"
              echo
              echo "- reason: unknown target"
              echo "- target: \`${PUBLISH_TARGET}\`"
              echo "- tag: \`${PUBLISH_TAG}\`"
              echo "- trigger: \`${{ github.event_name }}\`"
              echo
              echo "### Valid moon project ids"
              echo
              echo "\`${valid_targets}\`"
            } >> "${GITHUB_STEP_SUMMARY}"

            exit 1
          fi

          project_source="$(jq -r --arg target "${PUBLISH_TARGET}" '.projects[] | select(.id == $target) | .source' <<<"${projects_json}")"
          echo "PUBLISH_PROJECT_SOURCE=${project_source}" >> "${GITHUB_ENV}"

      - name: Resolve publish tag
        if: env.PUBLISH_TAG == ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          version="$(jq -r --arg source "${PUBLISH_PROJECT_SOURCE}" '.[$source] // empty' .release-please-manifest.json)"
          if [[ ! "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "ERROR: No stable version found for '${PUBLISH_PROJECT_SOURCE}' in .release-please-manifest.json." >&2
            exit 1
          fi

          prefix="v${version}-alpha."
          alpha="$(
            gh api --paginate "repos/${GITHUB_REPOSITORY}/releases" --jq '.[].tag_name' |
              awk -v prefix="${prefix}" '
                index($0, prefix) == 1 {
                  n = substr($0, length(prefix) + 1)
                  if (n ~ /^[0-9]+$/ && n > max) max = n
                }
                END { print max + 1 }
              '
          )"
          tag="${prefix}${alpha}"

          echo "PUBLISH_TAG=${tag}" >> "${GITHUB_ENV}"
          echo "Inferred publish tag '${tag}' from ${PUBLISH_PROJECT_SOURCE} version ${version}."

      - name: Ensure release exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if ! gh release view "${PUBLISH_TAG}" >/dev/null 2>&1; then
            gh release create "${PUBLISH_TAG}" \
              --target "${PUBLISH_REF}" \
              --title "${PUBLISH_TAG}" \
              --prerelease \
              --generate-notes
          fi

      - name: Publish target(s)
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
          DOCS_PUBLISH_SSH_KEY: ${{ secrets.DOCS_PUBLISH_SSH_KEY }}
          DOCS_PUBLISH_TOKEN: ${{ secrets.DOCS_PUBLISH_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
          PUBLISH_TARGET: ${{ env.PUBLISH_TARGET }}
          PUBLISH_TAG: ${{ env.PUBLISH_TAG }}
        run: |
          set -euo pipefail
          moon run "${PUBLISH_TARGET}:publish" --force
      - name: Publish summary
        if: always()
        run: |
          set -euo pipefail
          {
            echo "## Publish Summary"
            echo
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| target | \`${PUBLISH_TARGET}\` |"
            echo "| ref | \`${PUBLISH_REF}\` |"
            echo "| tag | \`${PUBLISH_TAG}\` |"
            echo "| trigger | \`${{ github.event_name }}\` |"
            echo "| result | \`${{ job.status }}\` |"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Moon run report summary
        if: always()
        continue-on-error: true
        uses: moonrepo/run-report-action@bbe7e99bf2aca819ec660ec01fc59d84bdd492d6 # v1.10.0
        with:
          access-token: ${{ github.token }}
          skip-comment: "true"
