---
$schema: "file://../../.moon/cache/schemas/project.json"

language: rust
layer: library
tags:
  - publishes-wasm

tasks:
  build:
    script: |
      set -euo pipefail
      rustup target add wasm32-wasip1 >/dev/null 2>&1 || true
      CARGO_TARGET_DIR="$PWD/target" cargo build --release --target wasm32-wasip1
    inputs:
      - "Cargo.toml"
      - "build.rs"
      - "src/**/*.rs"
      - "src/template/**/*.jinja"
    outputs:
      - "target/wasm32-wasip1/release/zellij-tabbar.wasm"

  check:
    script: |
      set -euo pipefail
      rustup target add wasm32-wasip1 >/dev/null 2>&1 || true
      CARGO_TARGET_DIR="$PWD/target" cargo check --target wasm32-wasip1
    inputs:
      - "Cargo.toml"
      - "build.rs"
      - "src/**/*.rs"
      - "src/template/**/*.jinja"

  test:
    script: |
      set -euo pipefail
      host_target="$(rustc -vV | awk '/^host:/ {print $2}')"
      CARGO_TARGET_DIR="$PWD/target" cargo test --target "$host_target"
    inputs:
      - "Cargo.toml"
      - "build.rs"
      - "src/**/*.rs"
      - "src/template/**/*.jinja"

  e2e:
    deps:
      - "~:build"
    script: bats tests
    inputs:
      - "tests/**/*"
      - "target/wasm32-wasip1/release/zellij-tabbar.wasm"
    options:
      cache: false

  demo:
    type: run
    deps:
      - "~:build"
    script: |
      set -euo pipefail
      echo "Starting Zellij demo session with zellij-tabbar plugin"
      command -v zellij >/dev/null || { echo "zellij is required" >&2; exit 1; }
      command -v ghostty >/dev/null || { echo "ghostty is required" >&2; exit 1; }
      layout_path="$PWD/demo.kdl"
      ghostty "+new-window" -e env \
        zellij \
          --new-session-with-layout "$layout_path"
    inputs:
      - "demo.kdl"
      - "target/wasm32-wasip1/release/zellij-tabbar.wasm"
    options:
      cache: false
      interactive: true
      runInCI: false

  install:
    deps:
      - "~:build"
    script: |
      set -euo pipefail
      wasm_path="$PWD/target/wasm32-wasip1/release/zellij-tabbar.wasm"
      install_dir="${ZELLIJ_PLUGIN_DIR:-$HOME/.config/zellij/plugins}"
      mkdir -p "$install_dir"
      cp "$wasm_path" "$install_dir/zellij-tabbar.wasm"
    inputs:
      - "target/wasm32-wasip1/release/zellij-tabbar.wasm"
    options:
      cache: false

  publish:
    deps:
      - "~:publish-wasm"
    options:
      cache: false
      runInCI: false
